<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>t</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background-color: #f0f0f0;
            font-family: sans-serif;
            margin: 0;
        }
        .wrapper {
            text-align: center;
        }
        .container {
            position: relative;
            width: 400px;
            height: 400px;
            background-color: white;
            margin: 0 auto;
            border: 1px solid #ccc;
        }
        .container img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .panel {
            position: absolute;
            width: 50%;
            height: 50%;
            transition: all 0.6s ease-in-out;
            z-index: 2;
        }
        .red { top: 0; left: 0; background-color: #ff0000; }
        .yellow { top: 0; right: 0; background-color: #ffff00; }
        .blue { bottom: 0; left: 0; background-color: #0000ff; }
        .green { bottom: 0; right: 0; background-color: #008000; }

        .container:hover .red {
            transform: translateX(-30%) skewX(-30deg);
        }
        .container:hover .yellow {
            transform: translateX(30%) skewX(30deg);
        }

        .container:hover .blue {
            transform: translateX(-30%) skewX(30deg);
        }

        .container:hover .green {
            transform: translateX(30%) skewX(-30deg);
        }
    </style>
</head>
<body>
    <div class="wrapper">
        <div class="container">
            <img src="https://static1.dualshockersimages.com/wordpress/wp-content/uploads/2023/09/gojo-satoru-finally-sealed-in-the-latest-episode-of-jujutsu-kaisen.jpg">
            <div class="panel red"></div>
            <div class="panel yellow"></div>
            <div class="panel blue"></div>
            <div class="panel green"></div>
        </div>
</body>
</html>
