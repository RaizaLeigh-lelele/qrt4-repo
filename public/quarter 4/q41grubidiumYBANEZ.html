<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Movie Tracker - Quarter 4 Graded 1 exer.</title>
    <style>
        :root {
            --gojo-blue: #00d2ff;
            --geto-purple: #9d50bb;
            --hollow-purple: linear-gradient(135deg, #6366f1 0%, #a855f7 100%);
            --overlay-blue: rgba(10, 15, 30, 0.85);
            --card-bg: rgba(15, 23, 42, 0.7);
            --accent: #f59e0b;
        }

        body { 
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            margin: 0;
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            color: #fff;
    
            background-image: url('https://i.pinimg.com/originals/e2/fa/08/e2fa08a481071faa9e88f3dffbf6f3ed.jpg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            background-repeat: no-repeat;
        }

        body::before {
            content: "";
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: var(--overlay-blue);
            backdrop-filter: blur(8px);
            z-index: -1;
        }

        .container { 
            width: 100%; 
            max-width: 500px; 
            z-index: 1; 
        }

        .form-container { 
            background: var(--card-bg); 
            padding: 30px; 
            border-radius: 24px; 
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
            overflow: hidden;
        }

        .form-container::after {
            content: "";
            position: absolute;
            top: 0; left: 0; 
            width: 100%; 
            height: 3px;
            background: linear-gradient(90deg, var(--gojo-blue), var(--geto-purple));
        }

        h2 { 
            margin-top: 0;
            text-align: center; 
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 3px;
            background: linear-gradient(to right, #fff, var(--gojo-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        label { 
            display: block; 
            font-size: 0.75rem; 
            font-weight: bold;
            color: var(--gojo-blue); 
            margin-bottom: 6px;
            text-shadow: 0 0 5px rgba(0, 210, 255, 0.5);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1.5px solid rgba(255,255,255,0.1);
            border-radius: 10px;
            background: rgba(0, 0, 0, 0.5);
            color: white;
            box-sizing: border-box;
            transition: 0.3s ease;
        }

        input:focus, textarea:focus {
            outline: none;
            border-color: var(--gojo-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.2);
        }

        .star-rating { 
            font-size: 32px; 
            margin-bottom: 20px; 
            display: flex;
            justify-content: center;
            gap: 5px;
        }

        .star-rating span {
            transition: 0.2s;
            text-shadow: 0 0 5px rgba(0,0,0,0.5);
        }

        .star-rating .active { 
            color: var(--accent); 
            text-shadow: 0 0 15px var(--accent);
        }

        .btn-add { 
            background: var(--hollow-purple);
            color: white; 
            border: none; 
            padding: 15px; 
            width: 100%; 
            border-radius: 12px; 
            font-weight: bold; 
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 5px 15px rgba(168, 85, 247, 0.3);
        }

        .btn-add:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 25px rgba(168, 85, 247, 0.5);
            filter: brightness(1.2);
        }

        .movie-list { 
            margin-top: 40px; 
        }

        .movie-card {
            background: rgba(15, 23, 42, 0.8);
            border-radius: 18px;
            padding: 18px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            border: 1px solid rgba(255,255,255,0.05);
            position: relative;
            transition: 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .movie-card:hover {
            transform: scale(1.03);
            box-shadow: -5px 0 15px var(--geto-purple), 5px 0 15px var(--gojo-blue);
        }

        .movie-card img {
            width: 90px;
            height: 130px;
            object-fit: cover;
            border-radius: 10px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .movie-details h4 { 
            margin: 5px 0; 
            font-size: 1.25rem; 
            color: #fff;
        }

        .meta { 
            font-size: 0.8rem; 
            color: var(--gojo-blue);
            font-weight: 600;
        }

        .stars { 
            color: var(--accent); 
            font-size: 1rem;
            margin-bottom: 8px; 
        }

        .summary { 
            font-size: 0.85rem; 
            color: #cbd5e1; 
            line-height: 1.4;
            background: rgba(255,255,255,0.05);
            padding: 8px;
            border-radius: 6px;
        }

        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: var(--overlay-blue);
        }

            ::-webkit-scrollbar-thumb {
            background: var(--hollow-purple);
            border-radius: 10px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--gojo-blue);
        }

        @keyframes pulse-glow {
            0% { 
                box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); 
            }
            50% { 
                box-shadow: 0 0 40px rgba(157, 80, 187, 0.4); 
            }
            100% { 
                box-shadow: 0 0 20px rgba(0, 210, 255, 0.2); 
            }
        }

        .form-container {
            animation: pulse-glow 6s infinite ease-in-out;
        }

        input, select, textarea {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        input:focus {
            transform: translateY(-2px);
            background: rgba(255, 255, 255, 0.1);
        }

        @keyframes manifest {
            from { 
                opacity: 0; 
                transform: translateY(20px); 
            }
            to { 
                opacity: 1; 
                transform: translateY(0); 
            }
        }

        .container {
            animation: manifest 0.8s ease-out forwards;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            color: #64748b;
        }

        .empty-state i {
            display: block;
            font-size: 3rem;
            margin-bottom: 10px;
        }

        @keyframes backgroundMove {
            0% { 
                background-position: 0% 50%; 
            }
            50% { 
                background-position: 100% 50%; 
            }
            100% { 
                background-position: 0% 50%; 
            }
        }

        body {
            background-size: 120% 120%;
            animation: backgroundMove 20s infinite linear;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="form-container">
        <h2>Moviesss 🤤 (list)</h2>
        
        <label>Movie Title</label>
        <input type="text" id="movieTitle" placeholder="Ex: Rich vs. Poor Minecraft Civilization">

        <div style="display: flex; gap: 10px;">
            <div style="flex: 1;">
                <label>Year</label>
                <input type="number" id="movieYear" placeholder="1967">
            </div>
            <div style="flex: 1;">
                <label>Genre</label>
                <select id="genre">
                    <option value="Sci-Fi">Sci-Fi</option>
                    <option value="Drama">Drama</option>
                    <option value="Action">Action</option>
                    <option value="Horror">Horror</option>
                </select>
            </div>
        </div>

        <label>Image URL</label>
        <input type="text" id="movieUrl" placeholder="Paste image link here!!">

        <label>Rating</label>
        <div class="star-rating" id="starInput">
            <span data-value="1">★</span><span data-value="2">★</span><span data-value="3">★</span><span data-value="4">★</span><span data-value="5">★</span>
        </div>

        <label>Short Review</label>
        <textarea id="movieSummary" placeholder="Optional notes!!"></textarea>

        <button class="btn-add" onclick="addMovie()">Save Movie</button>
    </div>

    <div class="movie-list" id="listContainer"></div>
</div>

<script>
    let currentRating = 0;

    const stars = document.querySelectorAll('#starInput span');
    stars.forEach(star => {
        star.onclick = function() {
            currentRating = this.getAttribute('data-value');
            stars.forEach(s => s.classList.toggle('active', s.getAttribute('data-value') <= currentRating));
        }
    });

    function addMovie() {
        const title = document.getElementById('movieTitle').value;
        const year = document.getElementById('movieYear').value;
        const genre = document.getElementById('genre').value;
        const url = document.getElementById('movieUrl').value;
        const summary = document.getElementById('movieSummary').value;

        if (!title || !year || currentRating === 0) {
            alert("Please fill in Title, Year, and Rating!");
            return;
        }

        const movieEntry = {
            title,
            year,
            genre,
            rating: parseInt(currentRating),
            poster: url || "https://i.pinimg.com/736x/f0/07/fb/f007fbdbc36b546b0ba6cd4281ddd05e.jpg",
            summary: summary || "No review added."
        };

        let db = JSON.parse(localStorage.getItem('movieLinkDB')) || [];
        db.push(movieEntry);
        localStorage.setItem('movieLinkDB', JSON.stringify(db));

        document.querySelectorAll('input, textarea').forEach(i => i.value = '');
        currentRating = 0;
        stars.forEach(s => s.classList.remove('active'));
        displayMovies();
    }

    function displayMovies() {
        const container = document.getElementById('listContainer');
        const movies = JSON.parse(localStorage.getItem('movieLinkDB')) || [];
        
        container.innerHTML = movies.map(m => `
            <div class="movie-card">
                <img src="${m.poster}" onerror="this.src='https://i.pinimg.com/736x/f0/07/fb/f007fbdbc36b546b0ba6cd4281ddd05e.jpg'">
                <div class="movie-details">
                    <div class="meta">${m.year} • ${m.genre}</div>
                    <h4>${m.title}</h4>
                    <div class="stars">${'★'.repeat(m.rating)}${'☆'.repeat(5-m.rating)}</div>
                    <div class="summary">${m.summary}</div>
                </div>
            </div>
        `).reverse().join('');
    }

    displayMovies();
</script>

</body>
</html>
